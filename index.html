<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Initiative Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"></div>
    <h1 class="auth-title">Initiative Tracker</h1>
    <p class="auth-subtitle">Gerencie a ordem de iniciativa das suas sessões de RPG</p>

    <div id="alert" class="alert alert-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" type="text" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input class="form-control" id="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary btn-block mt-2" id="submit-btn" type="submit">Entrar</button>
    </form>

    <div class="auth-footer">
      <a href="./forgot-password.html">Esqueci minha senha</a>
      &nbsp;·&nbsp;
      <a href="./register.html">Criar conta</a>
    </div>
  </div>

  <script type="module" src="./dist/auth.js"></script>
</body>
</html>
