<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inimigos | Initiative Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="container">
    <div id="page-alert" class="alert alert-error"></div>

    <div class="page-header flex-between">
      <div>
        <h1>Inimigos</h1>
        <p class="text-muted">Crie e gerencie as fichas dos seus inimigos</p>
      </div>
      <button class="btn btn-primary" id="new-enemy-btn">+ Novo Inimigo</button>
    </div>

    <!-- Formulário (oculto por padrão) -->
    <div id="form-section" class="card mb-3" style="display:none">
      <div class="card-header">
        <h2 id="form-title">Novo Inimigo</h2>
      </div>
      <div id="form-alert" class="alert alert-error"></div>
      <form id="enemy-form">
        <div class="form-group">
          <label class="form-label" for="name">Nome</label>
          <input class="form-control" id="name" type="text" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="initiative_bonus">Bônus de Iniciativa</label>
            <input class="form-control" id="initiative_bonus" type="number" value="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="hp">HP</label>
            <input class="form-control" id="hp" type="number" value="10" min="1">
          </div>
          <div class="form-group">
            <label class="form-label" for="passive_defense">Defesa Passiva</label>
            <input class="form-control" id="passive_defense" type="number" value="10" min="0">
          </div>
        </div>
        <div class="flex gap-1 mt-2">
          <button class="btn btn-primary" id="submit-btn" type="submit">Criar</button>
          <button class="btn btn-outline" id="cancel-btn" type="button">Cancelar</button>
        </div>
      </form>
    </div>

    <div id="enemy-list" class="grid-2"></div>
  </main>

  <script type="module" src="./dist/enemies.js"></script>
</body>
</html>
