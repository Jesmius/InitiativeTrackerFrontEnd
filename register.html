<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | Initiative Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"></div>
    <h1 class="auth-title">Criar Conta</h1>
    <p class="auth-subtitle">Escolha seu papel na mesa</p>

    <div id="alert" class="alert alert-error"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" type="text" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" type="email" autocomplete="email" required>
        <p class="form-hint">Necessário para recuperação de senha.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input class="form-control" id="password" type="password" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirmar Senha</label>
        <input class="form-control" id="confirm-password" type="password" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de usuário</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="role" value="player" checked>
            🧙 Jogador
          </label>
          <label>
            <input type="radio" name="role" value="master">
            🎲 Mestre de Mesa
          </label>
        </div>
      </div>
      <button class="btn btn-primary btn-block mt-2" id="submit-btn" type="submit">Criar Conta</button>
    </form>

    <div class="auth-footer">
      Já tem conta? <a href="./index.html">Fazer login</a>
    </div>
  </div>

  <script type="module" src="./dist/register.js"></script>
</body>
</html>
