<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci a Senha | Initiative Tracker</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"></div>
    <h1 class="auth-title">Redefinir Senha</h1>
    <p class="auth-subtitle">Informe seu username e email cadastrados para redefinir sua senha.</p>

    <div id="alert" class="alert alert-error"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" type="text" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email cadastrado</label>
        <input class="form-control" id="email" type="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="new-password">Nova Senha</label>
        <input class="form-control" id="new-password" type="password" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirmar Nova Senha</label>
        <input class="form-control" id="confirm-password" type="password" autocomplete="new-password" required>
      </div>
      <button class="btn btn-primary btn-block mt-2" id="submit-btn" type="submit">Redefinir Senha</button>
    </form>

    <div class="auth-footer">
      <a href="./index.html">Voltar para o login</a>
    </div>
  </div>

  <script type="module" src="./dist/forgot-password.js"></script>
</body>
</html>
